# goreleaser config for bashy — pure-Go Bash 5.3 drop-in.
# Builds static (CGO_ENABLED=0) binaries for the 6 supported platforms.
# NOTE: bashy depends on the qiangli/sh fork via `replace => ../sh`. CI runs
# ./scripts/bootstrap-siblings.sh first to clone it next door at the pinned SHA.
version: 2

before:
  hooks:
    - go mod download

builds:
  - id: bashy
    main: ./cmd/bashy
    binary: bashy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X 'github.com/qiangli/bashy/internal/cli.bashVersion=5.3.0(1)-bashy-{{ trimsuffix .Version "-dev" }}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
  - id: bash
    main: ./cmd/bash
    binary: bash
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X 'github.com/qiangli/bashy/internal/cli.bashVersion=5.3.0(1)-bashy-{{ trimsuffix .Version "-dev" }}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: bashy
    ids: [bashy]
    name_template: "bashy-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
  - id: bash
    ids: [bash]
    name_template: "bash-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: qiangli
    name: bashy
  # A `-dev` semver tag is the QA candidate — mark it a PRE-RELEASE so promote.yml
  # (which refuses to byte-promote a non-prerelease) accepts it, and so users don't
  # mistake the untested candidate for the promoted release. `auto` flags any tag
  # carrying a semver prerelease component (-dev / -rc / -beta).
  prerelease: auto

changelog:
  use: github
  sort: asc
