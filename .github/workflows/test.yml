name: test
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        # windows deferred: sh's killSig + cgo/MLX need a windows-build pass
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # bashy resolves the sh engine via `replace mvdan.cc/sh/v3 => ../sh`.
      # Clone it next door at the SHA pinned in .sibling-pins.
      - name: Bootstrap sibling deps (../sh)
        shell: bash
        run: ./scripts/bootstrap-siblings.sh
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
