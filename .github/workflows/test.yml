name: test
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Windows is a real target (classgo staging runs on it). It builds the
        # lean cmd/bash + cmd/bashy and test-runs internal/agentos; internal/cli's
        # readline/forced-tty tests are deferred there (they hang without a PTY).
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      # bashy resolves the sh engine via `replace mvdan.cc/sh/v3 => ../sh`.
      # Clone it next door at the SHA pinned in .sibling-pins.
      - name: Bootstrap sibling deps (../sh)
        shell: bash
        run: ./scripts/bootstrap-siblings.sh
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # The DEFAULT lean cmd/bashy (shell + coreutils userland + git + dag +
      # bashy go) is pure-Go and cross-compiles everywhere. The heavy host layers
      # — engines (bashy podman/ollama, -tags bashy_engines, cgo+btrfs/MLX, unix)
      # and obs (bashy otel, -tags bashy_obs) — are opt-in and built separately.
      - name: Build + vet + test (shell core + lean agentos)
        shell: bash
        timeout-minutes: 10
        run: |
          set -euxo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build ./cmd/bash ./cmd/bashy
            go vet  ./cmd/bash ./cmd/bashy ./internal/agentos
            # internal/cli's readline / forced-interactive tests hang without a PTY
            go test -v -timeout 5m ./internal/agentos
          else
            go build ./cmd/bash ./cmd/bashy ./internal/...
            go vet  ./cmd/bash ./cmd/bashy ./internal/...
            go test ./internal/cli ./internal/agentos
          fi
      # E2E: build the real bashy binary on THIS OS and confirm every command
      # `bashy commands` advertises actually dispatches (no "No such command" /
      # "not in this build" / "No such file"). Runs on macOS AND Windows — the
      # cross-platform half of the command-support guarantee.
      - name: E2E command dispatch (all listed verbs run on this OS)
        shell: bash
        timeout-minutes: 10
        run: go test -v -timeout 8m -tags e2e -run TestE2EAllListedCommandsDispatch ./internal/agentos
      - name: Cross-build lean cmd/bashy for every release platform (CGO_ENABLED=0)
        shell: bash
        run: |
          for osarch in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${osarch%/*}; arch=${osarch#*/}
            echo "cmd/bashy $os/$arch (lean)..."
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -o /dev/null ./cmd/bashy
          done

  # The bash-5.3 conformance gate. Runs the real fixture suite against the pure
  # cmd/bash drop-in and fails on any NEW regression vs test/bash53-known-failures.txt
  # (a shrinking ratchet — see scripts/ci-bash53-gate.sh). This is the CI arm of
  # the discipline that, until 2026-07-10, was enforced only by a human eyeballing
  # the Results line — which let four POSIX-frontier commits silently drop the
  # suite from 86/86 to 79/86. Linux only: one measured SUT is enough, and the
  # fixtures' .right files are version-specific to the fetched source.
  bash53-gate:
    runs-on: ubuntu-latest
    # ENFORCING as of 2026-07-12. This was `continue-on-error: true` ("advisory on
    # first landing... then delete this line"), and the line was never deleted. The
    # cost was not theoretical: the gate hung on every run (the old shell fixture
    # loop's watchdog could not kill its fixture, so the capture blocked until the
    # 1200s deadline), exited INCONCLUSIVE, and continue-on-error reported it GREEN.
    # For ~10 merges the conformance gate did not run, and a trap regression
    # (86/86 -> 85/86) walked in unnoticed. An advisory gate is not a gate.
    steps:
      - uses: actions/checkout@v7
      - name: Bootstrap sibling deps (../sh, ../coreutils, ../readline)
        shell: bash
        run: ./scripts/bootstrap-siblings.sh
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # The bash-5.3 tests/ tree is a gitignored symlink locally. Fetch the exact
      # upstream source the engine targets — the bash-5.3 RELEASE, matching the
      # local external/bash-5.3 symlink — pinned by sha256, and symlink it.
      # Downloading + running a test suite is not bundling — see CLAUDE.md
      # Third-Party Libraries.
      #
      # This was bash-5.3-rc2 until 2026-07-13, which made CI measure a
      # different conformance target than every local run: rc2's
      # valid_function_word accepted quoted/procsub-shaped function names
      # ("allow quotes for now") and its tests/func.right encodes that, but
      # the release reverted it (W_HASDOLLAR -> W_HASDOLLAR|W_QUOTED), so the
      # func fixture demanded opposite behaviors on CI vs a dev box (run
      # 29267773644: want "<(:)" vs the engine's correct released-5.3
      # "not a valid identifier" diagnostic). Keep this pin and the local
      # symlink pointing at the SAME upstream snapshot.
      - name: Fetch pinned bash-5.3 release source (for the fixture tree)
        shell: bash
        run: |
          set -euxo pipefail
          url=https://ftp.gnu.org/gnu/bash/bash-5.3.tar.gz
          sha=0d5cd86965f869a26cf64f4b71be7b96f90a3ba8b3d74e27e8e9d9d5550f31ba
          curl -fsSL --retry 3 -o /tmp/bash-5.3.tar.gz "$url"
          echo "$sha  /tmp/bash-5.3.tar.gz" | sha256sum -c -
          mkdir -p external
          tar -xzf /tmp/bash-5.3.tar.gz -C /tmp
          ln -sfn /tmp/bash-5.3 external/bash-5.3
          test -d external/bash-5.3/tests
      - name: Build the recho/zecho fixture helpers
        shell: bash
        run: make test-bash-helpers
      # The fixtures exercise locale-dependent globbing, collation and multibyte
      # handling, and they name these seven locales explicitly. Without them,
      # glob-test/intl fail for want of a locale — an ENVIRONMENT failure that
      # would otherwise be scored as a conformance failure and baselined as a
      # phantom bug. Provide the environment; measure the shell.
      # (intl/unicode1.sub prints "you do not have the fr_FR.ISO8859-1 locale
      # installed" and fails when fr_FR.ISO8859-1 is missing — it was.)
      - name: Generate the locales the bash-5.3 fixtures require
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get -qq update
          sudo apt-get -qq install -y locales
          sudo tee -a /etc/locale.gen >/dev/null <<'EOF'
          en_US.UTF-8 UTF-8
          de_DE.UTF-8 UTF-8
          fr_FR.ISO-8859-1 ISO-8859-1
          ru_RU.CP1251 CP1251
          zh_TW BIG5
          zh_HK BIG5-HKSCS
          EOF
          sudo locale-gen
          # Shift-JIS is not ASCII-compatible, so create it explicitly while
          # suppressing only the expected ASCII warning that exits non-zero.
          sudo localedef --no-warnings=ascii -i ja_JP -f SHIFT_JIS ja_JP.SJIS
          locale -a
          locale -a | grep -i '^fr_FR'
          locale -a | grep -i '^ja_JP.*sjis'
          LC_ALL=fr_FR.ISO8859-1 locale charmap
          LC_ALL=ja_JP.SJIS locale charmap

      - name: bash-5.3 no-regression ratchet
        shell: bash
        # All 86 fixtures, nothing skipped. Serial wall is ~3-5 min (278s on a dev
        # box; `jobs` alone is 112s of it and is indivisible). A 2-core runner is
        # slower, so bound at 10 — but a hang can no longer eat the budget: the Go
        # harness always terminates and always prints Results.
        timeout-minutes: 10
        run: ./scripts/ci-bash53-gate.sh
