name: release
on:
  push:
    tags:
      # Build + publish a PRE-RELEASE only for -dev tags. A bare vX.Y.Z tag is a
      # PROMOTION of already-tested bytes (see .github/workflows/promote.yml) and
      # must NOT rebuild from source — prod ships exactly what QA tested, byte for
      # byte. GoReleaser marks a -dev semver tag as a prerelease automatically.
      - 'v*-dev'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # bashy resolves the sh engine via `replace mvdan.cc/sh/v3 => ../sh`.
      # Clone it next door at the SHA pinned in .sibling-pins.
      - name: Bootstrap sibling deps (../sh)
        shell: bash
        run: ./scripts/bootstrap-siblings.sh
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
